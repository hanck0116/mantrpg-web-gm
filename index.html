<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>ManTRPG Web GM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="status-panel" aria-label="상단 상태창">
        <div class="status-card">
          <h2>플레이어</h2>
          <p>HP <strong id="player-hp">30/30</strong></p>
          <p>MP <strong id="player-mp">12/12</strong></p>
          <p>코인 <strong id="player-coin">0</strong> / 레벨 <strong id="player-level">1</strong></p>
          <p>인벤: 초기화권 <strong id="inv-skill-reset">0</strong> / 무공서 <strong id="inv-martial-book">0</strong> / 마법서 <strong id="inv-magic-book">0</strong></p>
          <p>층 <strong id="game-floor">1</strong></p>
          <p>턴 <strong id="game-turn">1</strong></p>
          <p>현재 단계 <strong id="game-phase">BATTLE</strong></p>
          <p>스탯 포인트 <strong id="player-stat-points">0</strong></p>
          <p>보유 스킬 <strong id="player-skill-count">0</strong></p>
        </div>
        <div class="status-card">
          <h2>적 (1명)</h2>
          <p>이름 <strong id="enemy-name">그림자 도적</strong></p>
          <p>HP <strong id="enemy-hp">20/20</strong></p>
          <p>상태 <strong id="enemy-state">대기</strong></p>
        </div>
      </header>

      <section class="log-panel" aria-label="중앙 전투 로그">
        <h1>전투 로그</h1>
        <ul id="combat-log" class="log-list"></ul>
      </section>

      <section class="manage-panel" aria-label="게임 관리 버튼">
        <button type="button" id="new-game-button">새 게임</button>
        <button type="button" id="save-game-button">저장</button>
        <button type="button" id="load-game-button">불러오기</button>
      </section>

      <section class="action-panel" aria-label="하단 행동 버튼">
        <button type="button" data-action="attack">공격</button>
        <button type="button" data-action="defend">방어</button>
        <button type="button" data-action="move">접근</button>
        <button type="button" data-action="move-up">↑</button>
        <button type="button" data-action="move-down">↓</button>
        <button type="button" data-action="move-left">←</button>
        <button type="button" data-action="move-right">→</button>
        <button type="button" data-action="magic">마법</button>
        <button type="button" data-action="observe">관찰</button>
      </section>


      <section class="reward-panel" id="reward-panel" hidden>
        <h2>보상 선택</h2>
        <div id="reward-options"></div>
        <button type="button" id="reroll-reward-button">코인 1개로 보상 리롤</button>
      </section>

      <section class="stat-panel" id="stat-panel" hidden>
        <h2 id="stat-panel-title">스탯 분배</h2>
        <p>남은 스탯 포인트: <strong id="stat-panel-points">0</strong></p>
        <div id="stat-controls" class="stat-controls"></div>
        <button type="button" id="finish-stat-button">스탯 분배 완료</button>
      </section>

      <section class="skill-panel" id="skill-panel" hidden>
        <h2>심상세계 3단계: 스킬 생성</h2>
        <p id="skill-panel-desc">스킬 후보를 선택하세요.</p>
        <div id="skill-options"></div>
      </section>

      <section class="map-panel" aria-label="하단 2D 전술 맵">
        <h2>7x7 전술 맵</h2>
        <div id="tactical-map" class="tactical-map" role="grid" aria-label="7x7 고정 전술 맵"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
